version: "3.9"

services:
  app:
    build: .
    container_name: tg-shop-app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  db:
    image: postgres:16-alpine
    container_name: tg-shop-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: telegram_shop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d telegram_shop"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    container_name: tg-shop-nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  espocrm-db:
    image: mariadb:11
    container_name: espocrm-db
    restart: unless-stopped
    env_file:
      - deploy/espocrm/.env
    environment:
      MARIADB_ROOT_PASSWORD: ${ESPO_DB_ROOT_PASSWORD:-espocrm_root}
      MARIADB_DATABASE: ${ESPO_DB_NAME:-espocrm}
      MARIADB_USER: ${ESPO_DB_USER:-espocrm}
      MARIADB_PASSWORD: ${ESPO_DB_PASSWORD:-espocrm_pass}
    volumes:
      - espocrm_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u root -p$$MARIADB_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 8

  espocrm:
    image: espocrm/espocrm:latest
    container_name: espocrm-app
    restart: unless-stopped
    env_file:
      - deploy/espocrm/.env
    depends_on:
      espocrm-db:
        condition: service_healthy
    environment:
      ESPOCRM_DATABASE_HOST: espocrm-db
      ESPOCRM_DATABASE_NAME: ${ESPO_DB_NAME:-espocrm}
      ESPOCRM_DATABASE_USER: ${ESPO_DB_USER:-espocrm}
      ESPOCRM_DATABASE_PASSWORD: ${ESPO_DB_PASSWORD:-espocrm_pass}
      ESPOCRM_ADMIN_USERNAME: ${ESPO_ADMIN_USERNAME:-admin}
      ESPOCRM_ADMIN_PASSWORD: ${ESPO_ADMIN_PASSWORD:-admin123456}
      ESPOCRM_SITE_URL: ${ESPOCRM_SITE_URL:-https://crm.example.com}
    ports:
      - "8081:80"
    volumes:
      - espocrm_data:/var/www/html

volumes:
  pg_data:
  espocrm_db_data:
  espocrm_data:
