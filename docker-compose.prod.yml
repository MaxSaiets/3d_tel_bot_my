version: "3.9"

# Production compose — used on DigitalOcean VPS
# Mounts real Let's Encrypt certs + built webapp static files

services:
  app:
    build: .
    container_name: tg-shop-app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"   # Exposed to host; nginx proxies localhost:8000
    networks:
      - shop-net

  db:
    image: postgres:16-alpine
    container_name: tg-shop-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: telegram_shop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d telegram_shop"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shop-net

  # Nginx runs on the HOST (systemd), not in Docker — avoids DNS resolution issues
  # Host nginx config is in /etc/nginx/sites-available/telegram-shop.conf

  espocrm-db:
    image: mariadb:11
    container_name: espocrm-db
    restart: unless-stopped
    env_file:
      - deploy/espocrm/.env
    environment:
      MARIADB_ROOT_PASSWORD: ${ESPO_DB_ROOT_PASSWORD:-espocrm_root}
      MARIADB_DATABASE: ${ESPO_DB_NAME:-espocrm}
      MARIADB_USER: ${ESPO_DB_USER:-espocrm}
      MARIADB_PASSWORD: ${ESPO_DB_PASSWORD:-espocrm_pass}
    volumes:
      - espocrm_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u root -p$$MARIADB_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 8
    networks:
      - shop-net

  espocrm-app:
    image: espocrm/espocrm:latest
    container_name: espocrm-app
    restart: unless-stopped
    env_file:
      - deploy/espocrm/.env
    depends_on:
      espocrm-db:
        condition: service_healthy
    environment:
      ESPOCRM_DATABASE_HOST: espocrm-db
      ESPOCRM_DATABASE_NAME: ${ESPO_DB_NAME:-espocrm}
      ESPOCRM_DATABASE_USER: ${ESPO_DB_USER:-espocrm}
      ESPOCRM_DATABASE_PASSWORD: ${ESPO_DB_PASSWORD:-espocrm_pass}
      ESPOCRM_ADMIN_USERNAME: ${ESPO_ADMIN_USERNAME:-admin}
      ESPOCRM_ADMIN_PASSWORD: ${ESPO_ADMIN_PASSWORD:-admin123456}
      ESPOCRM_SITE_URL: https://crm.167.71.44.167.nip.io
    volumes:
      - espocrm_data:/var/www/html
    networks:
      - shop-net

networks:
  shop-net:
    driver: bridge

volumes:
  pg_data:
  espocrm_db_data:
  espocrm_data:
