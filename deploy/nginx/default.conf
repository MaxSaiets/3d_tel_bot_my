# HTTP -> HTTPS redirect for main domain
server {
    listen 80;
    server_name 167.71.44.167.nip.io;
    return 301 https://$host$request_uri;
}

# Fallback HTTP health check (used before SSL is set up)
server {
    listen 80 default_server;
    server_name _;
    location /health {
        proxy_pass http://app:8000;
    }
}

# Bot API + WebApp (HTTPS)
server {
    listen 443 ssl;
    server_name 167.71.44.167.nip.io;

    ssl_certificate     /etc/letsencrypt/live/167.71.44.167.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/167.71.44.167.nip.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Telegram webhook
    location /telegram/ {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Internal API
    location /api/ {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check
    location /health {
        proxy_pass http://app:8000;
    }

    # React WebApp static files
    location /app/ {
        alias /var/www/webapp/;
        try_files $uri $uri/ /app/index.html;
    }
}

# EspoCRM HTTP -> HTTPS redirect
server {
    listen 80;
    server_name crm.167.71.44.167.nip.io;
    return 301 https://$host$request_uri;
}

# EspoCRM (HTTPS)
server {
    listen 443 ssl;
    server_name crm.167.71.44.167.nip.io;

    ssl_certificate     /etc/letsencrypt/live/167.71.44.167.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/167.71.44.167.nip.io/privkey.pem;

    location / {
        proxy_pass http://espocrm-app:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
